# claude-deployable deploy — milestone 2.
#
# On push to main, build the services/hello image, push it to GHCR
# tagged with the commit SHA (immutable) and `:main` (floating), then
# SSH to the VPS and run `docker compose pull && up -d`. The VPS
# already has `docker login ghcr.io` cached from install time using
# its own read:packages PAT (see SETUP.md M2 slice), so we don't
# re-login there.
#
# This workflow is GATED on the repo variable DEPLOY_ENABLED. Until
# the VPS is provisioned and the secrets below are set, leave
# DEPLOY_ENABLED unset (or "false") — the job will report as "skipped"
# rather than failing on every push to main.
#
# Required secrets (Settings -> Secrets and variables -> Actions ->
# Secrets), set once after VPS provisioning:
#
#   VPS_HOST         — hostname or IP of the VPS
#   VPS_USER         — sudoless deploy user with docker group
#   VPS_SSH_KEY      — PRIVATE half of the deploy key (full file,
#                       including BEGIN/END lines)
#   VPS_KNOWN_HOSTS  — output of `ssh-keyscan -t ed25519,rsa <host>`
#                       run from a trusted machine
#   VPS_COMPOSE_DIR  — absolute path on the VPS where compose.yml
#                       lives (e.g. /home/deploy/claude-deployable)
#
# Required variable (Settings -> Secrets and variables -> Actions ->
# Variables):
#
#   DEPLOY_ENABLED   — set to the literal string "true" to flip the
#                       deploy job on. Anything else => skipped.

name: deploy

on:
  push:
    branches: [main]
  # workflow_dispatch lets a maintainer redeploy main without a code
  # change, which is useful for testing the SSH path after rotating
  # secrets.
  workflow_dispatch:

concurrency:
  # Two pushes to main shouldn't race the same compose project.
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    name: build, push, deploy
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    env:
      # ghcr.io/<owner>/<repo>/hello — lower-cased to satisfy
      # GHCR's repo-name rules. github.repository is already
      # lowercase by GitHub convention, but tolower is cheap.
      IMAGE: ghcr.io/${{ github.repository }}/hello
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Lower-case image path
        # GHCR rejects upper-case in repository paths. Force lower so
        # forks where GITHUB_REPOSITORY contains capitals still work.
        id: image
        run: |
          lc="$(echo '${{ env.IMAGE }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=$lc" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/hello/Dockerfile
          push: true
          build-args: |
            VERSION=${{ github.sha }}
          tags: |
            ${{ steps.image.outputs.ref }}:${{ github.sha }}
            ${{ steps.image.outputs.ref }}:${{ steps.vars.outputs.sha_short }}
            ${{ steps.image.outputs.ref }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        # Bring our own ssh client config rather than depending on a
        # third-party action. The known_hosts file is required —
        # StrictHostKeyChecking=yes is the default and we want it.
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_COMPOSE_DIR: ${{ secrets.VPS_COMPOSE_DIR }}
          IMAGE_REF: ${{ steps.image.outputs.ref }}
          IMAGE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Pull the freshly-pushed :main tag and roll the service.
          # `docker compose up -d` is a no-op when the running
          # container already references the new image digest, so
          # this is idempotent on a redeploy of the same SHA.
          ssh -i ~/.ssh/deploy_key \
              -o IdentitiesOnly=yes \
              -o BatchMode=yes \
              "${VPS_USER}@${VPS_HOST}" \
              bash -se <<EOF
          set -euo pipefail
          cd "${VPS_COMPOSE_DIR}"
          docker compose pull hello
          docker compose up -d hello
          # Trim dangling images so the VPS disk doesn't bloat after
          # many deploys. Only dangling — never tagged.
          docker image prune -f >/dev/null
          EOF

      - name: Summary
        run: |
          {
            echo "### deployed"
            echo ""
            echo "- image: \`${{ steps.image.outputs.ref }}:${{ github.sha }}\`"
            echo "- floating tag: \`${{ steps.image.outputs.ref }}:main\`"
            echo "- VPS compose dir: \`\$VPS_COMPOSE_DIR\` (from secret)"
          } >> "$GITHUB_STEP_SUMMARY"
